version: "3.8"

services:
  epsilon-api:
    build: .
    container_name: epsilon-api
    ports:
      - "8000:8000"
    depends_on:
      - redis
    env_file:
      - .env 
    command: poetry run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  redis:
    image: "redis:alpine"
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
